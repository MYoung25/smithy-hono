name: Test

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege baseline (CI-CD-04): fork-PR runs only need to read the repo.
# Declaring this explicitly prevents an accidental over-grant if a future job
# adds write-dependent steps, and keeps the default GITHUB_TOKEN read-only.
permissions:
  contents: read

jobs:
  security-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace deps
        # --ignore-scripts (CI-CD-04): don't auto-run fork-authored `prepare`
        # build scripts at install time; the build below runs explicitly.
        run: npm install -w @smithy-hono/security-core --ignore-scripts

      - name: ARCH-01 import guard (no node:* in core)
        run: npm -w @smithy-hono/security-core run lint

      - name: Build dist (ESM .js + .d.ts) and pack tarball
        run: |
          npm -w @smithy-hono/security-core run build
          npm -w @smithy-hono/security-core pack

      - name: Storage conformance + unit tests
        run: npm -w @smithy-hono/security-core run test

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: npm
          # `./gradlew check` runs both example integ tests (todo-api + crud-api),
          # so key the npm cache on both example lockfiles.
          cache-dependency-path: |
            examples/todo-api/package-lock.json
            examples/crud-api/package-lock.json

      - name: Run unit, snapshot, and example integration tests
        run: ./gradlew check

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-report
          path: build/reports/tests/test/

  crud-ui:
    # The demo frontend (examples/crud-ui) — typecheck + production build so it
    # can't silently rot (e.g. src/api.ts drifting from the crud-api model). Pure
    # frontend, no @smithy-hono deps, so it's a small standalone job. The build is
    # also the deploy prerequisite (deploy/cf-crud serves crud-ui/dist).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: examples/crud-ui/package-lock.json
      - name: Typecheck + build the demo UI
        working-directory: examples/crud-ui
        run: |
          npm ci
          npm run build

  type-check:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: typecheck/package-lock.json

      - name: Run smithyBuild
        run: ./gradlew smithyBuild

      - name: Type-check generated TypeScript
        run: ./gradlew test -Dgroups=slow
