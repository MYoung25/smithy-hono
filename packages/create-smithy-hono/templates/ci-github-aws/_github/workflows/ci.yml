# CI/CD for {{APP_SLUG}} — AWS target (CDK: Lambda + DynamoDB + CloudFront).
#
#   build   runs on every push + pull request: Smithy codegen (JDK 21), typecheck,
#           unit tests, and the SPA build (full-stack only). No credentials needed.
#   deploy  runs only on push to `main`, after a green build: assumes an IAM role via
#           GitHub OIDC (keyless — no long-lived AWS keys) and runs the CDK deploy.
#
# One-time keyless setup:
#   1. Create a GitHub OIDC identity provider in your AWS account
#      (token.actions.githubusercontent.com, audience sts.amazonaws.com).
#   2. Create a deploy role trusting this repo's `main` branch, with permissions for
#      CloudFormation/Lambda/DynamoDB/S3/CloudFront (and `cdk bootstrap` run once).
#   3. Set the values below (Settings → Secrets and variables → Actions):
#      Secret:   AWS_DEPLOY_ROLE_ARN   arn of the role from step 2
#                OIDC_CLIENT_SECRET    OIDC apps only — IdP confidential client secret
#                                      (unset for the anonymous scaffold; step no-ops)
#      Variables: AWS_REGION           deploy region, e.g. us-east-1
#                 DEPLOY_DOMAIN        custom domain (optional; also needs a us-east-1
#                                      ACM cert wired in smithy-aws-deploy.config.mjs)
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Install
        run: npm install
      - name: Codegen (Smithy → src/generated)
        run: npm run codegen
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Build UI (full-stack only)
        run: npm run build:ui --if-present

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write # required for GitHub → AWS OIDC federation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Configure AWS credentials (OIDC, keyless)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Install
        run: npm install
      - name: Codegen (Smithy → src/generated)
        run: npm run codegen
      - name: Materialize deploy secrets (OIDC apps)
        run: |
          if [ -n "$OIDC_CLIENT_SECRET" ]; then
            node -e 'require("fs").writeFileSync("deploy.secrets.json", JSON.stringify({ OIDC_CLIENT_SECRET: process.env.OIDC_CLIENT_SECRET }))'
          fi
        env:
          OIDC_CLIENT_SECRET: ${{ secrets.OIDC_CLIENT_SECRET }}
      - name: Deploy (CDK)
        run: |
          if [ -n "$DEPLOY_DOMAIN" ]; then
            npm run deploy -- "$DEPLOY_DOMAIN"
          else
            npm run deploy
          fi
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          DEPLOY_DOMAIN: ${{ vars.DEPLOY_DOMAIN }}
