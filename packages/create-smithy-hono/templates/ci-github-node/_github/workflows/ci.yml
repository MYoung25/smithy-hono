# CI/CD for {{APP_SLUG}} — Node target (Docker image + Kubernetes).
#
#   build   runs on every push + pull request: Smithy codegen (JDK 21), typecheck,
#           unit tests, and the SPA build (full-stack only). No credentials needed.
#   deploy  runs only on push to `main`, after a green build: logs in to the GitHub
#           Container Registry via the built-in OIDC-minted GITHUB_TOKEN (keyless),
#           then builds/pushes the image and applies the k8s manifests to your cluster.
#
# A Kubernetes API server isn't a federated-OIDC endpoint the way AWS STS is, so the
# cluster credential is a kubeconfig you provide. The registry push, though, is
# keyless — GITHUB_TOKEN authenticates to ghcr.io with no stored password.
#
# Configure before the first deploy (Settings → Secrets and variables → Actions):
#   Secrets:
#     KUBECONFIG_B64      base64 of a kubeconfig scoped to the deploy namespace
#                         (`base64 -w0 < ~/.kube/config`)
#     OIDC_CLIENT_SECRET  OIDC apps only — IdP confidential client secret
#                         (unset for the anonymous scaffold; the step no-ops)
#   Variables:
#     DEPLOY_DOMAIN       the TLS host the Ingress serves (needs a cert-manager issuer)
#     IMAGE_REGISTRY      registry to push to, e.g. ghcr.io/<owner>/{{APP_SLUG}}
#                         (set `registry` in smithy-node-deploy.config.mjs to match)
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Install
        run: npm install
      - name: Codegen (Smithy → src/generated)
        run: npm run codegen
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Build UI (full-stack only)
        run: npm run build:ui --if-present

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write # push the image to ghcr.io via GITHUB_TOKEN (keyless)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Log in to GitHub Container Registry (keyless)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure kubectl
        run: |
          mkdir -p "$HOME/.kube"
          echo "$KUBECONFIG_B64" | base64 -d > "$HOME/.kube/config"
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
      - name: Install
        run: npm install
      - name: Codegen (Smithy → src/generated)
        run: npm run codegen
      - name: Materialize deploy secrets (OIDC apps)
        run: |
          if [ -n "$OIDC_CLIENT_SECRET" ]; then
            node -e 'require("fs").writeFileSync("deploy.secrets.json", JSON.stringify({ OIDC_CLIENT_SECRET: process.env.OIDC_CLIENT_SECRET }))'
          fi
        env:
          OIDC_CLIENT_SECRET: ${{ secrets.OIDC_CLIENT_SECRET }}
      - name: Deploy (build/push image + apply manifests)
        run: |
          if [ -n "$DEPLOY_DOMAIN" ]; then
            npm run deploy -- "$DEPLOY_DOMAIN"
          else
            npm run deploy
          fi
        env:
          IMAGE_REGISTRY: ${{ vars.IMAGE_REGISTRY }}
          DEPLOY_DOMAIN: ${{ vars.DEPLOY_DOMAIN }}
